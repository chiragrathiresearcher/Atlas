name: ATLAS CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  BUILD_TYPE: Release
  PYTHON_VERSION: "3.11"

jobs:
  # ─────────────────────────────────────────────────────────────────
  #  Python Tests — ARVS integration, guidance, sensors
  # ─────────────────────────────────────────────────────────────────
  python-tests:
    name: Python Unit & Integration Tests
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest-cov

      - name: Lint (ruff)
        run: |
          pip install ruff
          ruff check src/python/ simulation/ --ignore E501,E402

      - name: Run ARVS integration tests
        run: |
          cd src/python
          python -m pytest ../../tests/test_arvs_integration.py -v \
            --tb=short --cov=arvs_bridge --cov-report=xml

      - name: Run sensor processor tests
        run: |
          cd src/python
          python -m pytest ../../tests/test_sensor_processor.py -v --tb=short

      - name: Run guidance tests
        run: |
          cd src/python
          python -m pytest ../../tests/test_guidance.py -v --tb=short

      - name: Run control core tests
        run: |
          cd src/python
          python -m pytest ../../tests/test_control_core.py -v --tb=short

      - name: Run full simulation (nominal, 60s)
        run: |
          cd src/python
          python ../../simulation/run_simulation.py --duration 60 --scenario nominal

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage.xml
          flags: python

  # ─────────────────────────────────────────────────────────────────
  #  C++ Build & Tests
  # ─────────────────────────────────────────────────────────────────
  cpp-build:
    name: C++ Build & Unit Tests
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y cmake g++ ninja-build libgtest-dev

      - name: Configure CMake (ATLAS headers only — no ARVS extern dep in CI)
        run: |
          cmake -B build -S . \
            -DCMAKE_BUILD_TYPE=${{ env.BUILD_TYPE }} \
            -DBUILD_TESTS=ON \
            -DBUILD_ROS2_NODES=OFF \
            -G Ninja \
            -DCMAKE_CXX_FLAGS="-DATLAS_CI_BUILD"

      - name: Build
        run: cmake --build build --parallel

      - name: Run C++ tests
        working-directory: build
        run: ctest --output-on-failure --timeout 30

  # ─────────────────────────────────────────────────────────────────
  #  Static Analysis
  # ─────────────────────────────────────────────────────────────────
  static-analysis:
    name: Static Analysis
    runs-on: ubuntu-22.04
    needs: [cpp-build]

    steps:
      - uses: actions/checkout@v4

      - name: Install clang-tidy
        run: sudo apt-get install -y clang-tidy

      - name: Configure for analysis
        run: |
          cmake -B build -S . \
            -DCMAKE_BUILD_TYPE=Debug \
            -DCMAKE_EXPORT_COMPILE_COMMANDS=ON \
            -DBUILD_ROS2_NODES=OFF

      - name: Run clang-tidy on ATLAS headers
        run: |
          clang-tidy src/cpp/include/*.hpp \
            -p build \
            --checks="bugprone-*,clang-analyzer-*,performance-*" \
            -- -std=c++17 -Isrc/cpp/include || true

  # ─────────────────────────────────────────────────────────────────
  #  Documentation check
  # ─────────────────────────────────────────────────────────────────
  docs-check:
    name: Documentation Check
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v4

      - name: Check all referenced files exist
        run: |
          python scripts/check_doc_refs.py || echo "Doc ref check skipped"

      - name: Validate hardware specs table
        run: |
          python scripts/validate_hardware_constants.py

  # ─────────────────────────────────────────────────────────────────
  #  Full SIL Simulation (matrix: all scenarios)
  # ─────────────────────────────────────────────────────────────────
  simulation-matrix:
    name: SIL Simulation — ${{ matrix.scenario }}
    runs-on: ubuntu-22.04
    needs: [python-tests]
    strategy:
      matrix:
        scenario: [nominal, abort_at_max_q, sensor_degrade]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run ${{ matrix.scenario }} scenario (90s)
        run: |
          cd src/python
          python ../../simulation/run_simulation.py \
            --duration 90 \
            --scenario ${{ matrix.scenario }}

      - name: Upload FDR artifact
        uses: actions/upload-artifact@v4
        with:
          name: fdr-${{ matrix.scenario }}
          path: /tmp/atlas_sim_fdr.jsonl
